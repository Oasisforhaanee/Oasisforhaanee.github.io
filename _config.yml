# Site settings
title: Haanee Choi # site title
description: >- # site description
  예비 대학원생을 위한 대학교 자습 노트와 연구 포트폴리오. 슈뢰딩거 방정식,
  양자역학의 수학적 구조, 재료물리 학습 기록을 다룹니다.
lang: en-US # default lang
timezone: Asia/Seoul # set your timezone
image: /assets/img/ogp.png # This image used for Open Graph more info https://ogp.me/
repo: https://github.com/Oasisforhaanee/Oasisforhaanee.github.io # site repo [optional]
mode: dark # default theme "dark" | "light"

# Profile settings
author:
  name: Haanee Choi # author name
  bio: >- # tell to the world
    서울대학교 재료공학부 / 대학교 자습 노트 — 양자역학, 재료물리, 수학 학습 기록.
  username: Oasisforhaanee # general username
  github: Oasisforhaanee # github username
  twitter: # twitter username
  facebook: # facebook username
  email: # email adress
  avatar: /assets/img/avatar.jpg # change with your own avatar

# URL settings
url: "https://oasisforhaanee.github.io" #
baseurl:
permalink: /:title/
google_analytics: # leave it blank if not wish
fb_appid:

# Collection setting
collections:
  posts:
    output: true

# Markdown settings
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: post
      comments: false

# Jekyll Compose default front matter
jekyll_compose:
  post_default_front_matter:
    modified:
    tags: []
    description:
  draft_default_front_matter:
    modified:
    tags: []
    description:

# Homepage limit posts
number_of_posts: 10

# Build settings
sass:
  style: compressed

include:
  - _redirects
  - .htaccess

exclude:
  - CNAME
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - CHANGELOG.md
  - README.md
  - node_modules
  - CODE_OF_CONDUCT.md
  - CONTRIBUTING.md
  - lighthouse.png
  - klise-*.gem
  - klise.gemspec

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-postfiles
